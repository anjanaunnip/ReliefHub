{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit New Request</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f8f9fa; }
    .card { border-radius: 15px; border: none; max-width: 700px; margin: auto; }
    .form-label { font-weight: 600; }
    .form-control, .form-select { border-radius: 10px; }
    .btn-danger { border-radius: 10px; font-weight: 600; font-size: 16px; padding: 12px; }
    .section-title { font-size: 18px; font-weight: 600; color: #dc3545; margin-bottom: 15px; }
    .input-group-text { background: #fff; border-right: none; }
    .form-control:focus, .form-select:focus { border-color: #dc3545; box-shadow: 0 0 5px rgba(220,53,69,0.3); }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold text-danger" href="{% url 'campdashboard' %}">❤️ Relief Hub</a>
      <div>
        <a class="btn btn-outline-danger btn-sm" href="{% url 'logout' %}">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h6>Welcome, {{ camp_profile.name }}</h6>

    <!-- Navigation Tabs -->
    <ul class="nav nav-tabs mb-4">
      <li class="nav-item">
        <a class="nav-link" href="{% url 'campdashboard' %}">
          <i class="fa fa-home"></i> Overview
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="{% url 'my_requests' %}">
          <i class="fa fa-list"></i> My Requests
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" href="{% url 'new_requests' %}">
          <i class="fa fa-plus"></i> New Request
        </a>
      </li>
    </ul>

    <!-- New Request Form -->
    <div class="card shadow p-4">
      <h3 class="mb-4 text-center text-danger"><i class="fa fa-hand-holding-heart"></i> Submit Aid Request</h3>
      <form method="post">
        {% csrf_token %}

        <!-- Aid Details -->
        <div class="section-title"><i class="fa fa-box"></i> Aid Details</div>
        <div class="mb-3">
          <label class="form-label">Category <span class="text-danger">*</span></label>
          <select class="form-select" name="category" required onchange="this.form.submit()">
            <option value="">Select aid category</option>
            {% for cat in categories %}
              <option value="{{ cat.id }}" {% if selected_category and selected_category.id == cat.id %}selected{% endif %}>
                {{ cat.name }}
              </option>
            {% endfor %}
          </select>
        </div>

        {% if items %}
        <div class="mb-3">
          <label class="form-label">Item <span class="text-danger">*</span></label>
          <select class="form-select" name="item" required>
            <option value="">Select an item</option>
            {% for itm in items %}
              <option value="{{ itm.id }}">{{ itm.name }}</option>
            {% endfor %}
          </select>
        </div>
        {% endif %}

        <div class="row mb-3">
          <div class="col">
            <label class="form-label">Quantity Needed <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa fa-sort-numeric-up"></i></span>
              <input type="number" class="form-control" name="quantity" required>
            </div>
          </div>
          <div class="col">
            <label class="form-label">Unit <span class="text-danger">*</span></label>
            <select name="unit" class="form-select" required>
  <option value="">Select unit</option>
  <option value="kg">Kilograms (kg)</option>
  <option value="nos">Numbers (nos)</option>
  <option value="liters">Liters</option>
  <option value="packs">Packs</option>
  <option value="boxes">Boxes</option>
</select>

          </div>
        </div>

        <!-- Priority -->
        <div class="row mb-3">
          <div class="col">
            <label class="form-label">Urgency Level <span class="text-danger">*</span></label>
            <select class="form-select" name="urgency" required>
              <option value="">Select urgency</option>
              <option>Normal</option>
              <option>High</option>
              <option>Urgent</option>
            </select>
          </div>
          <div class="col">
            <label class="form-label">People Affected <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa fa-users"></i></span>
              <input type="number" class="form-control" name="people" placeholder="Number of people" required>
            </div>
          </div>
        </div>

        <!-- Location -->
        <div class="section-title"><i class="fa fa-map-marker-alt"></i> Location</div>
        <div class="mb-3">
          <label class="form-label">Needed By Date <span class="text-danger">*</span></label>
          <input type="date" class="form-control" name="date_needed" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Relief Camp Location <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="location" placeholder="Enter full address with landmarks" required>
        </div>

        <!-- Contact Info -->
        <div class="section-title"><i class="fa fa-phone"></i> Contact Info</div>
        <div class="row mb-3">
          <div class="col">
            <label class="form-label">Contact Person <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="contact_person" required>
          </div>
          <div class="col">
            <label class="form-label">Phone Number <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa fa-phone"></i></span>
              <input type="text" class="form-control" name="phone" required>
            </div>
          </div>
        </div>

        <!-- Notes -->
        <div class="section-title"><i class="fa fa-file-alt"></i> Additional Information</div>
        <div class="mb-3">
          <label class="form-label">Justification for Request</label>
          <textarea class="form-control" name="justification" rows="3"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Additional Notes (Optional)</label>
          <textarea class="form-control" name="notes" rows="2"></textarea>
        </div>

        <button type="submit" class="btn btn-danger w-100">
          <i class="fa fa-paper-plane"></i> Submit Aid Request
        </button>
      </form>
    </div>
  </div>
</body>
</html>
