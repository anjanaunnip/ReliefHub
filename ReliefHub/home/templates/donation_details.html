<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donate Item</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #fde8e4;
      font-family: Arial, sans-serif;
    }

    .donation-form-container {
      max-width: 600px;
      margin: 20px auto 40px; /* top margin reduced to make room for back button */
      background: #fff;
      padding: 30px 40px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .donation-form-container h3 {
      font-weight: bold;
      color: #d9534f;
    }

    .form-label {
      font-weight: 500;
      color: #333;
    }

    .btn-danger {
      background-color: #d9534f;
      border: none;
      transition: 0.3s;
    }

    .btn-danger:hover {
      background-color: #c9302c;
    }

    input, select, textarea {
      border-radius: 8px;
    }

    /* Back button style */
    .btn-back {
      display: block;
      max-width: 120px;
      margin: 20px auto 0;
      background-color: #ff6b6b; /* soft red */
      color: #fff;
      border: none;
      border-radius: 8px;
      transition: 0.3s;
      text-align: center;
    }

    .btn-back:hover {
      background-color: #e04e4e;
      color: #fff;
      text-decoration: none;
    }
  </style>
</head>
<body>

<!-- Back Button Outside Form -->
<a href="{% url 'donourdashboard' %}" class="btn btn-back">
  &larr; Back
</a>

<div class="donation-form-container">
  <h3 class="mb-4 text-center">Donate: <span class="text-danger">{{ item.name }}</span></h3>

  <form method="POST">
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label">Quantity *</label>
      <input type="number" min="1" name="quantity" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Unit *</label>
      <select class="form-select" name="unit" required>
  <option value="">Select unit</option>
  <option value="kg">Kilograms (kg)</option>
  <option value="nos">Numbers (nos)</option>
  <option value="liters">Liters</option>
  <option value="packs">Packs</option>
  <option value="boxes">Boxes</option>
</select>

    </div>

    <div class="mb-3">
      <label class="form-label">Expiry Date</label>
      <input type="date" name="expiry_date" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Pickup Location *</label>
      <input type="text" name="pickup_location" class="form-control" required>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Contact Person *</label>
        <input type="text" name="contact_person" class="form-control" required>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Phone Number *</label>
        <input type="tel" name="phone_number" class="form-control" required>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Preferred Pickup Time *</label>
      <select name="preferred_pickup_time" class="form-select" required>
        <option value="">Select</option>
        <option>Morning (8-11 AM)</option>
        <option>Afternoon (12-3 PM)</option>
        <option>Evening (4-7 PM)</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Urgency Level *</label>
      <select name="urgency_level" class="form-select" required>
        <option value="">Select</option>
        <option>Flexible</option>
        <option>Within 2 days</option>
        <option>Urgent</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Special Instructions</label>
      <textarea name="special_instructions" class="form-control" rows="3"></textarea>
    </div>

    <div class="d-grid">
      <button type="submit" class="btn btn-danger btn-lg">Submit Donation</button>
    </div>
  </form>
</div>

</body>
</html>
