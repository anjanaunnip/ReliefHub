<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Item - Relief Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-danger" href="{% url 'donourdashboard' %}">❤️ReliefHub</a>
    <div>
      <a class="btn btn-outline-secondary btn-sm" href="{% url 'donourdashboard' %}">&larr; Back</a>
      <a class="btn btn-outline-danger btn-sm" href="{% url 'logout' %}">Logout</a>
    </div>
  </div>
</nav>

<div class="container py-4">
  <h3 class="mb-4 text-center">Select an Item under <span class="text-danger">{{ category.name }}</span></h3><br><br>

  <div class="row row-cols-1 row-cols-md-3 g-4">
    {% for item in items %}
    <div class="col">
      <div class="card h-100 shadow-sm bg-dark text-white">
        {% if item.image %}
        <img src="{{ item.image.url }}" class="card-img-top p-3" style="height:150px; object-fit:contain;" alt="{{ item.name }}"><br><br>
        {% endif %}
        <div class="card-body text-center">
          <h5 class="card-title">{{ item.name }}</h5> <br><br><br>
          <!-- <p class="text-muted">{{ item.description|default:"No description" }}</p> -->
          <a href="{% url 'donation_details' item.id %}" class="btn btn-danger">Donate</a>
        </div>
      </div>
    </div>
    {% empty %}
    <p class="text-center text-muted">No items found in this category.</p>
    {% endfor %}
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
