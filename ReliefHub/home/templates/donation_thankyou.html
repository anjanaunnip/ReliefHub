<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - ReliefHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f3494f, #f77956);

            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .thankyou-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 550px;
            text-align: center;
            animation: fadeInUp 1s ease-in-out;
        }
        .thankyou-card h1 {
            font-size: 2.5rem;
            font-weight: bold;
            color: #28a745;
        }
        .thankyou-card p {
            font-size: 1.1rem;
            color: #555;
        }
        .thankyou-icon {
            font-size: 70px;
            color: #28a745;
            margin-bottom: 20px;
            animation: bounce 1.5s infinite;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .btn-custom {
            border-radius: 30px;
            padding: 12px 25px;
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn-custom:hover {
            transform: scale(1.05);
        }
    </style>
    <script src="https://kit.fontawesome.com/yourkitid.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="thankyou-card">
        <div class="thankyou-icon">
            <i class="fas fa-hand-holding-heart"></i>
        </div>
        <h1>Thank You!</h1>
        <p>Your donation request has been successfully submitted. <br> 
        Together, we are making a difference in bringing hope and relief.</p>
        
        <div class="mt-4">
            <a href="{% url 'donourdashboard' %}" class="btn btn-success btn-custom">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
            <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-custom">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- FontAwesome -->
    <script src="https://kit.fontawesome.com/2d3d6d5c22.js" crossorigin="anonymous"></script>
</body>
</html>
